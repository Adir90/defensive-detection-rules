# DEFENSIVE — owned-lab only
# Purpose: detect a pre-exfiltration staging pattern where the 7-Zip CLI is
# invoked with an inline password (-p<value>) AND a "delete source after
# archiving" flag (-sdel), producing an encrypted archive while removing the
# originals. This combination is a recognized precursor to data theft.
# Anonymized: no specific filenames, hashes, IPs, or hostnames from any real campaign.
# Validated against MITRE ATT&CK v15.

title: 7-Zip Archiving With Password And Delete-Source Flag
id: 6c2e7f1d-3a8b-4d9e-9c1f-5b2a4e6d8f3c
status: experimental
description: |
    Detects creation of a 7z.exe / 7zG.exe / 7za.exe process whose command line
    combines an inline password parameter (-p<value>, matched via regex to require
    a non-empty value) with the -sdel switch (delete source files after a successful
    archive). The combined behavior (encrypt + remove original) is a recognized
    pre-exfiltration staging pattern. Tune the rule by allowlisting known backup or
    compliance jobs that use this flag combination intentionally.
references:
    - https://attack.mitre.org/techniques/T1560/001/
    - https://attack.mitre.org/techniques/T1027/
author: Adir (independent defensive security researcher)
date: 2026/05/06
modified: 2026/05/06
tags:
    - attack.collection
    - attack.defense_evasion
    - attack.t1560.001
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection_7zip:
        Image|endswith:
            - '\7z.exe'
            - '\7zG.exe'
            - '\7za.exe'
    selection_password_flag:
        CommandLine|re: '\s-p[^\s"]+'
    selection_delete_source:
        CommandLine|contains:
            - ' -sdel'
            - ' -sdel '
    filter_signed_admin_parent:
        ParentImage|contains:
            - '\Program Files\'
            - '\Program Files (x86)\'
            - '\Windows\System32\'
    condition: selection_7zip and selection_password_flag and selection_delete_source and not filter_signed_admin_parent
falsepositives:
    - Legitimate backup or compliance scripts that intentionally encrypt and
      remove source data. Allowlist by ParentImage / signing certificate.
    - End-user encryption of personal documents prior to a planned migration.
      Investigate user context and target paths.
level: high
