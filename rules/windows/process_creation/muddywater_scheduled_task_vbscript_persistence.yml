# DEFENSIVE — owned-lab only
# Purpose: detect a persistence pattern observed in MuddyWater (Iranian APT) tradecraft
# where a scheduled task is created to invoke wscript.exe against a hidden VBScript stager.
# Anonymized: no specific filenames, hashes, IPs, or hostnames from any real campaign.
# Validated against MITRE ATT&CK v15.

title: Scheduled Task Creating Script Host Persistence With User-Writable Script
id: 7c1a9e3d-4f82-4c5e-9b3f-1a2b3c4d5e6f
status: experimental
description: |
    Detects creation of a scheduled task whose action invokes wscript.exe or cscript.exe
    against a .vbs / .vbe / .js file located in a non-standard or user-writable directory.
    This pattern is consistent with stager-based persistence used by several APT groups,
    notably MuddyWater. The detection is intended to fire in a defensive lab to validate
    that Sysmon + Sigma + Hayabusa pipelines surface the technique.
references:
    - https://attack.mitre.org/techniques/T1053/005/
    - https://attack.mitre.org/techniques/T1059/005/
author: Adir (independent defensive security researcher)
date: 2026/05/06
modified: 2026/05/06
tags:
    - attack.persistence
    - attack.execution
    - attack.t1053.005
    - attack.t1059.005
    - attack.t1059.007
logsource:
    category: process_creation
    product: windows
detection:
    selection_schtasks:
        Image|endswith: '\schtasks.exe'
        CommandLine|contains: '/create'
    selection_script_host:
        CommandLine|contains:
            - 'wscript'
            - 'cscript'
    selection_script_file:
        CommandLine|contains:
            - '.vbs'
            - '.vbe'
            - '.js'
    selection_writable_path:
        CommandLine|contains:
            - '\AppData\'
            - '\Temp\'
            - '\Public\'
            - '\ProgramData\'
            - '\Users\Default\'
    filter_signed_admin_paths:
        # NOTE: \Windows\System32\ deliberately excluded from this filter — schtasks.exe
        # and wscript.exe both live there, so filtering on System32 in the CommandLine
        # would suppress the legitimate true-positive constellation. Keep the user-writable
        # path assertions in selection_writable_path as the positive gate instead.
        CommandLine|contains:
            - '\Program Files\'
            - '\Program Files (x86)\'
    condition: selection_schtasks and selection_script_host and selection_script_file and selection_writable_path and not filter_signed_admin_paths
falsepositives:
    - Legitimate enterprise software that schedules a maintenance VBScript from a user-writable
      install path. Investigate the parent process and the script content; legitimate cases
      are usually signed and have a clear vendor.
    - Internal IT helper scripts. Onboard a known-good baseline before deploying broadly.
level: high
